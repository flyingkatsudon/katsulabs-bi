spring:
  application:
    name: bdp-next
  profiles:
    active: local

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:bdp;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

server:
  port: 8080

bdp:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-in-production-must-be-32chars-min}
    access-expiration-ms: 3600000
    refresh-expiration-ms: 604800000
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
