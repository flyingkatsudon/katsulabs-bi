# dev: 긴 aggregate 요청 중 Ctrl+C 시 graceful 대기로 Gradle 이 멈춘 것처럼 보이는 문제 방지
server:
  shutdown: immediate

logging:
  level:
    root: INFO
    com.katsulabs.bi: DEBUG
    com.katsulabs.bi.infrastructure: DEBUG

spring:
  datasource:
    url: jdbc:h2:mem:katsulabs-bi;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

# 추가 JDBC 데이터소스: modules/api/src/main/resources/local-h2-datasources.json (재시작 시 자동 등록)
