# 로컬 개발: PostgreSQL (docker-compose.postgres.yml)
server:
  shutdown: immediate

logging:
  level:
    root: INFO
    com.katsulabs.bi: DEBUG
    com.katsulabs.bi.infrastructure: DEBUG

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/katsulabs_bi
    username: katsulabs_bi
    password: katsulabs_bi
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: never
